<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>A01 開發需求單</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: #f0f2f7;
      font-size: 14px;
    }
    .page { max-width: 900px; margin: 32px auto; padding: 0 16px 60px; }
    .back { display: inline-block; margin-bottom: 16px; color: #0a66c2; text-decoration: none; font-size: 13px; }
    .back:hover { text-decoration: underline; }

    /* Document card */
    .doc { background: #fff; border: 1px solid #c0c6d4; padding: 32px 40px; }

    /* Header */
    .doc-header { display: flex; align-items: flex-start; margin-bottom: 20px; gap: 12px; }
    .company { font-size: 12px; line-height: 1.7; min-width: 220px; }
    .company strong { font-size: 14px; display: block; }
    .doc-title { flex: 1; text-align: center; font-size: 20px; font-weight: 700; letter-spacing: 4px; padding-top: 6px; }
    .classification { font-size: 13px; white-space: nowrap; padding-top: 6px; }

    .doc-id-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 13px; }

    /* Tables */
    table { width: 100%; border-collapse: collapse; margin-bottom: 14px; }
    th, td { border: 1px solid #888; padding: 7px 10px; vertical-align: middle; }
    .section-th {
      background: #3a3a3a; color: #fff; text-align: center;
      font-weight: 600; font-size: 14px; letter-spacing: 2px; padding: 9px;
    }
    .col-header { font-weight: 700; text-align: center; background: #f0f0f0; }
    .field-label { font-weight: 700; text-align: center; background: #f0f0f0; width: 100px; white-space: nowrap; }
    .sign-td { text-align: center; }

    /* Inputs */
    input[type="text"], input[type="date"], textarea {
      width: 100%;
      border: none;
      border-bottom: 1px solid #aaa;
      background: transparent;
      font-family: inherit;
      font-size: 13px;
      padding: 2px 4px;
      outline: none;
      transition: border-color .15s, background .15s;
    }
    input[type="text"]:focus, input[type="date"]:focus, textarea:focus {
      border-bottom-color: #0a66c2;
      background: #f0f6ff;
    }
    textarea {
      resize: vertical;
      min-height: 80px;
      border: 1px solid #ccc;
      border-radius: 3px;
      padding: 6px 8px;
    }
    textarea:focus { border-color: #0a66c2; }

    /* Checkbox / radio rows */
    .check-row { display: flex; flex-wrap: wrap; gap: 18px; align-items: center; padding: 3px 0; }
    .check-row label { display: flex; align-items: center; gap: 5px; cursor: pointer; white-space: nowrap; }
    .check-row label input[type="checkbox"],
    .check-row label input[type="radio"] {
      width: auto; border: none; accent-color: #0a66c2; cursor: pointer;
    }
    .cond-group { display: flex; align-items: center; gap: 6px; }
    .cond-group input[type="text"] { width: 140px; }

    /* Submit */
    .actions { margin-top: 24px; text-align: center; }
    .submit-btn {
      background: #0a66c2; color: #fff; border: none; border-radius: 6px;
      padding: 13px 48px; font-size: 15px; cursor: pointer;
      font-family: inherit; letter-spacing: 1px;
      transition: background .15s;
    }
    .submit-btn:hover { background: #084e99; }
    .submit-btn:disabled { background: #aaa; cursor: not-allowed; }

    /* Result */
    #result { margin-top: 24px; }
    .success-box {
      background: #e8f5e9; border: 1px solid #66bb6a; border-radius: 8px;
      padding: 24px 28px;
    }
    .success-box h3 { margin: 0 0 10px; color: #2e7d32; font-size: 16px; }
    .success-box .fname { font-size: 13px; color: #555; margin-bottom: 16px; }
    .open-btn {
      display: inline-block; background: #0a66c2; color: #fff;
      text-decoration: none; border-radius: 6px; padding: 10px 28px; font-size: 14px;
    }
    .open-btn:hover { background: #084e99; }
    .error-box {
      background: #fdecea; border: 1px solid #ef9a9a; border-radius: 8px;
      padding: 16px 20px; color: #c62828; font-size: 14px;
    }
  </style>
</head>
<body>
<div class="page">
  <a class="back" href="?">← 返回選單</a>

  <div class="doc">

    <!-- Company header -->
    <div class="doc-header">
      <div class="company">
        <strong>遊戲橘子數位科技股份有限公司</strong>
        Gamania Digital Entertainment Co., Ltd.
      </div>
      <div class="doc-title">開發需求單</div>
      <div class="classification">機密等級：內部限閱</div>
    </div>

    <div class="doc-id-row">
      <span>編號：（自動產生）</span>
      <span>日期：<input type="date" id="date" style="width:auto;border:none;border-bottom:1px solid #aaa;font-family:inherit;font-size:13px;outline:none;"></span>
    </div>

    <!-- 需求紀錄 -->
    <table>
      <tr><th class="section-th" colspan="3">需求紀錄</th></tr>
      <tr>
        <td>需求產品：<input type="text" id="product" placeholder="產品名稱"></td>
        <td>產品窗口：<input type="text" id="productContact" placeholder="姓名"></td>
        <td>開發負責人：<input type="text" id="devLead" placeholder="姓名"></td>
      </tr>
    </table>

    <!-- 版本歷程 -->
    <table>
      <tr><th class="section-th" colspan="4">版本歷程</th></tr>
      <tr>
        <th class="col-header">日期</th>
        <th class="col-header">版本編號</th>
        <th class="col-header">開發人員</th>
        <th class="col-header">版本描述</th>
      </tr>
      <tr>
        <td><input type="date" id="versionDate"></td>
        <td><input type="text" id="versionCode" placeholder="V1.0"></td>
        <td><input type="text" id="devPerson" placeholder="姓名"></td>
        <td><input type="text" id="versionDesc" placeholder="初版"></td>
      </tr>
    </table>

    <!-- 需求說明 -->
    <table>
      <tr><th class="section-th" colspan="2">需求說明</th></tr>
      <tr>
        <td class="field-label">項目</td>
        <td><input type="text" id="item" placeholder="需求項目名稱（也用於檔案命名）"></td>
      </tr>
      <tr>
        <td class="field-label">JIRA</td>
        <td><input type="text" id="jira" placeholder="GXY-XXXX"></td>
      </tr>
      <tr>
        <td class="field-label">類型</td>
        <td>
          <div class="check-row">
            <label><input type="checkbox" id="newFeature"> 新增功能</label>
            <label><input type="checkbox" id="modifyFeature"> 修改功能</label>
          </div>
        </td>
      </tr>
      <tr>
        <td class="field-label">異動處</td>
        <td>
          <div class="check-row">
            <label><input type="checkbox" id="api"> API</label>
            <label><input type="checkbox" id="sdk"> SDK</label>
            <label><input type="checkbox" id="backend"> 後台</label>
            <label><input type="checkbox" id="dataCenter"> 數據中心</label>
            <label><input type="checkbox" id="database"> 資料庫</label>
            <label><input type="checkbox" id="other"> 其他</label>
          </div>
        </td>
      </tr>
      <tr>
        <td class="field-label">機敏性評估</td>
        <td>
          <div class="check-row">
            <label><input type="radio" name="sensitive" value="none" checked> 無涉及機敏資訊</label>
            <div class="cond-group">
              <label><input type="radio" name="sensitive" value="partial"> 涉及部分資訊，如：</label>
              <input type="text" id="sensitiveDetail" placeholder="說明">
            </div>
          </div>
        </td>
      </tr>
      <tr>
        <td class="field-label">資訊安全評估</td>
        <td>
          <div class="check-row">
            <label><input type="radio" name="security" value="existing" checked> 按照既有資安架構</label>
            <div class="cond-group">
              <label><input type="radio" name="security" value="extra"> 額外套用條件，如：</label>
              <input type="text" id="securityDetail" placeholder="說明">
            </div>
          </div>
        </td>
      </tr>
      <tr>
        <td class="field-label">說明</td>
        <td><textarea id="description" placeholder="需求說明內容"></textarea></td>
      </tr>
    </table>

    <!-- 電子簽核 -->
    <table>
      <tr><th class="section-th" colspan="5">電子簽核</th></tr>
      <tr>
        <th class="col-header">開發負責人</th>
        <th class="col-header">經辦</th>
        <th class="col-header">測試人員確認</th>
        <th class="col-header">產品負責人</th>
        <th class="col-header">部門主管</th>
      </tr>
      <tr>
        <td class="sign-td"><input type="text" id="signDevLead" placeholder="姓名"></td>
        <td class="sign-td"><input type="text" id="signer" placeholder="姓名"></td>
        <td class="sign-td"><input type="text" id="tester" placeholder="姓名"></td>
        <td class="sign-td"><input type="text" id="productOwner" placeholder="姓名"></td>
        <td class="sign-td"><input type="text" id="manager" placeholder="姓名"></td>
      </tr>
    </table>

    <div class="actions">
      <button class="submit-btn" id="submitBtn" onclick="submitForm()">建立文件</button>
    </div>
  </div><!-- /doc -->

  <div id="result"></div>
</div><!-- /page -->

<script>
  // Default dates to today
  (function () {
    var today = new Date().toISOString().split('T')[0];
    document.getElementById('date').value = today;
    document.getElementById('versionDate').value = today;
  })();

  // Auto-fill sign row from devLead on first input
  document.getElementById('devLead').addEventListener('input', function () {
    var sign = document.getElementById('signDevLead');
    if (!sign.dataset.touched) sign.value = this.value;
  });
  document.getElementById('signDevLead').addEventListener('input', function () {
    this.dataset.touched = '1';
  });

  function v(id)    { return document.getElementById(id).value.trim(); }
  function cb(id)   { return document.getElementById(id).checked ? '■' : '□'; }
  function dv(id)   { return document.getElementById(id).value.replace(/-/g, '/') || ''; }
  function radio(name, value) {
    var el = document.querySelector('input[name="' + name + '"][value="' + value + '"]');
    return (el && el.checked) ? '■' : '□';
  }

  function submitForm() {
    var btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '建立中…';

    var config = {
      replaceText: {
        '{{日期}}':           dv('date'),
        '{{需求產品}}':        v('product'),
        '{{產品窗口}}':        v('productContact'),
        '{{開發負責人}}':      v('devLead') || v('signDevLead'),
        '{{版本編號}}':        v('versionCode') || 'V1.0',
        '{{開發人員}}':        v('devPerson'),
        '{{版本描述}}':        v('versionDesc') || '初版',
        '{{項目}}':            v('item'),
        '{{JIRA}}':            v('jira'),
        '{{說明}}':            v('description'),
        '{{經辦}}':            v('signer'),
        '{{測試人員確認}}':    v('tester'),
        '{{產品負責人}}':      v('productOwner'),
        '{{部門主管}}':        v('manager'),
        '{{新增功能}}':        cb('newFeature'),
        '{{修改功能}}':        cb('modifyFeature'),
        '{{API}}':             cb('api'),
        '{{SDK}}':             cb('sdk'),
        '{{後台}}':            cb('backend'),
        '{{數據中心}}':        cb('dataCenter'),
        '{{資料庫}}':          cb('database'),
        '{{其他}}':            cb('other'),
        '{{無涉及機敏資訊}}':  radio('sensitive', 'none'),
        '{{涉及部分資訊}}':    radio('sensitive', 'partial'),
        '{{涉及部分資訊說明}}': v('sensitiveDetail'),
        '{{按照既有資安架構}}': radio('security', 'existing'),
        '{{額外套用條件}}':    radio('security', 'extra'),
        '{{額外套用條件說明}}': v('securityDetail')
      }
    };

    google.script.run
      .withSuccessHandler(function (json) {
        btn.disabled = false;
        btn.textContent = '建立文件';
        try {
          var result = JSON.parse(json);
          if (result.newFileUrl) {
            showSuccess(result.newFileUrl, result.newName);
          } else {
            showError(result.error || JSON.stringify(result));
          }
        } catch (e) {
          showError(json);
        }
      })
      .withFailureHandler(function (err) {
        btn.disabled = false;
        btn.textContent = '建立文件';
        showError(err.message || String(err));
      })
      .copyFormTemplate('a01', config);
  }

  function showSuccess(url, name) {
    var el = document.getElementById('result');
    el.innerHTML =
      '<div class="success-box">' +
        '<h3>✅ 文件建立成功</h3>' +
        '<div class="fname">檔名：' + esc(name) + '</div>' +
        '<a class="open-btn" href="' + esc(url) + '" target="_blank" rel="noopener">開啟文件 →</a>' +
      '</div>';
    el.scrollIntoView({ behavior: 'smooth' });
  }

  function showError(msg) {
    document.getElementById('result').innerHTML =
      '<div class="error-box">❌ 建立失敗：' + esc(String(msg)) + '</div>';
  }

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
